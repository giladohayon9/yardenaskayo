.wall::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(130% 100% at 50% -8%, rgba(255,240,210,.07), rgba(0,0,0,0) 38%),
             radial-gradient(120% 95% at 50% 108%, rgba(0,0,0,.10), rgba(0,0,0,0) 55%)}
#app{max-width:460px;margin:0 auto;min-height:100vh;padding:0 16px calc(28px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column}
button{font-family:var(--body)}
:focus-visible{outline:2.5px solid var(--gold);outline-offset:2px}

/* splash */
.splash{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px}
.splash img{width:min(90%,400px);opacity:1;
  clip-path:inset(0 100% 0 0);-webkit-clip-path:inset(0 100% 0 0);
  animation:logoWipe 2.6s cubic-bezier(.22,.61,.36,1) .2s forwards;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.55))}
.splash .tag{opacity:0;color:var(--cream-dim);font-family:var(--serif);font-style:italic;font-size:19px;
  animation:fadeIn .9s ease 2.2s forwards}
@keyframes logoWipe{from{clip-path:inset(0 100% 0 0);-webkit-clip-path:inset(0 100% 0 0)}
  to{clip-path:inset(0 0 0 0);-webkit-clip-path:inset(0 0 0 0)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* top bar */
.topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px 2px 12px;margin-bottom:4px}
.topbar .logo-sm{height:24px;filter:drop-shadow(0 1px 1px rgba(255,248,235,.5))}
.linkbtn{background:transparent;border:1.5px solid rgba(255,244,225,.28);color:var(--cream);
  border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
.linkbtn:hover{border-color:var(--gold);color:#fff}
.iconbtn{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,244,225,.12);border:1.5px solid rgba(255,244,225,.3);color:var(--cream);cursor:pointer;padding:0;flex:0 0 auto}
.iconbtn:hover{border-color:var(--gold);color:#fff}
.iconbtn svg{width:21px;height:21px}
.back{background:none;border:none;color:var(--cream-dim);cursor:pointer;font-size:15px;font-weight:600;
  padding:8px 0;display:inline-flex;align-items:center;gap:6px}
.back:hover{color:var(--cream)}

/* generic */
.center{text-align:center}
.muted{color:var(--muted)}
.h-cream{font-family:var(--body);color:var(--cream);font-weight:800;letter-spacing:-.015em;margin:0}
.card{background:var(--parch);border:1px solid var(--parch-line);border-radius:16px;color:var(--ink);
  box-shadow:0 14px 30px rgba(18,9,2,.38)}
.pad{padding:18px}
.field{display:block;margin-bottom:14px}
.field>span{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
input,select,textarea{width:100%;font-family:var(--body);font-size:16px;color:var(--ink);padding:13px 14px;
  border-radius:12px;border:1.5px solid var(--parch-line);background:var(--field);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{min-height:74px;resize:vertical}
.btn{border:none;border-radius:13px;padding:14px 20px;font-weight:700;font-size:16px;cursor:pointer;width:100%;
  min-height:52px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-gold{background:linear-gradient(180deg,#CD9E5B,#A87E3D);color:#2A1B0E;border:1px solid #8a6630}
.btn-gold:hover{filter:brightness(1.05)}
.btn-dark{background:var(--espresso);color:var(--cream)}
.btn-dark:hover{filter:brightness(1.12)}
.btn-ghost{background:transparent;color:var(--cream);border:1.5px solid rgba(255,244,225,.3)}
.btn:disabled{background:var(--disabled);color:var(--disabled-ink);cursor:not-allowed;filter:none;border-color:var(--disabled)}
.btn-row{display:flex;gap:10px}
.mini{padding:11px 16px;font-size:14px;border-radius:11px;background:transparent;border:1.5px solid var(--parch-line);
  color:var(--walnut);font-weight:700;cursor:pointer;width:auto;min-height:44px}
.mini.danger{color:var(--danger);border-color:#E2C2BC}
.mini.gold{color:#2A1B0E;background:linear-gradient(180deg,#CD9E5B,#A87E3D);border-color:#8a6630}
.note{font-size:12.5px;color:var(--muted);margin-top:8px}
.empty{color:var(--cream-dim);font-size:14.5px;background:rgba(36,24,13,.34);border:1px solid rgba(255,244,225,.14);
  border-radius:14px;padding:16px;text-align:center}

/* login */
.login-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px;padding:10px 0 30px}
.login-wrap img.logo{width:min(64%,260px);margin:0 auto 10px;display:block;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5))}

/* home */
.greet{font-family:var(--serif);color:var(--cream);font-size:24px;font-weight:500;text-align:center;margin:6px 0 0;line-height:1.3}
.greet .fn{font-family:'Poppins',var(--body);font-weight:700;color:#fff;font-size:27px}
.home-logo{width:min(70%,280px);display:block;margin:18px auto 8px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5))}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:140px;
  background:rgba(36,24,13,.4);border:1px solid rgba(255,244,225,.18);border-radius:20px;color:var(--cream);
  cursor:pointer;font-size:16px;font-weight:600;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  box-shadow:0 14px 30px rgba(20,12,4,.3);transition:transform .15s,border-color .15s}
.tile:hover{transform:translateY(-2px);border-color:rgba(201,168,106,.6)}
.tile svg{width:38px;height:38px;color:var(--gold)}

/* lists / cards on dark */
.dcard{background:rgba(244,238,225,.96);border:1px solid var(--parch-line);border-radius:16px;color:var(--ink);
  box-shadow:0 12px 26px rgba(18,9,2,.34);padding:16px;margin-bottom:12px}
.row-between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.title-s{font-family:var(--body);font-size:18px;font-weight:700;letter-spacing:-.01em}
.price{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--walnut);white-space:nowrap}
.sub{color:var(--muted);font-size:13.5px;line-height:1.5}

/* selectable specialist */
.pick{display:flex;align-items:center;gap:14px;width:100%;text-align:right;background:rgba(244,238,225,.96);
  border:1.5px solid var(--parch-line);border-radius:16px;padding:14px;color:var(--ink);cursor:pointer;margin-bottom:10px}
.pick.active{border-color:var(--gold);background:#fff}
.mono{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  background:rgba(185,138,75,.16);border:1.5px solid var(--gold);color:var(--gold-deep);font-family:var(--serif);font-weight:600;font-size:18px}
.pick .nm{font-family:var(--serif);font-size:18px;font-weight:600;display:block;line-height:1.1}
.pick .rl{font-size:13px;color:var(--muted)}

/* section heading on dark */
.sec{font-family:var(--body);font-size:17px;font-weight:700;letter-spacing:-.01em;color:var(--cream);margin:22px 0 12px;display:flex;align-items:center;gap:12px}
.sec::before{content:'';flex:0 0 18px;height:1px;background:rgba(255,244,225,.35)}
.sec::after{content:'';flex:1;height:1px;background:rgba(255,244,225,.35)}

/* calendar 2 weeks */
.calwrap{background:rgba(244,238,225,.96);border:1px solid var(--parch-line);border-radius:18px;padding:14px;box-shadow:0 12px 26px rgba(18,9,2,.34)}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.dow span{text-align:center;font-size:11px;font-weight:700;color:var(--gold-deep)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{aspect-ratio:1/1;min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  border-radius:12px;border:1.5px solid var(--parch-line);background:var(--field);color:var(--ink);cursor:pointer;padding:2px}
.day .dn{font-family:var(--serif);font-size:18px;font-weight:600;line-height:1}
.day .mk{font-size:9px;font-weight:700;line-height:1}
.day.off{background:var(--parch-2);color:var(--disabled-ink);cursor:default;border-color:var(--parch-line)}
.day.avail{border-color:var(--gold);color:var(--walnut)}
.day.avail .mk{color:var(--gold-deep)}
.day.booked .mk{color:var(--danger)}
.day.sel{background:var(--gold);border-color:var(--gold);color:#2a1b0e}
.day.sel .mk{color:#5a4a25}

/* times */
.times{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.slot{min-height:48px;border-radius:999px;border:1.5px solid var(--gold);background:var(--field);color:var(--walnut);
  font-weight:600;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.slot.active{background:var(--espresso);color:var(--cream);border-color:var(--espresso)}
.slot.taken{background:var(--disabled);color:var(--disabled-ink);border-color:var(--disabled);text-decoration:line-through;cursor:not-allowed}

/* treatment select */
.trt{display:flex;align-items:center;gap:12px;width:100%;text-align:right;background:rgba(244,238,225,.96);
  border:1.5px solid var(--parch-line);border-radius:14px;padding:14px;color:var(--ink);cursor:pointer;margin-bottom:10px}
.trt.active{border-color:var(--gold);background:#fff}
.trt .radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--parch-line);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.trt.active .radio{border-color:var(--gold)}
.trt.active .radio::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--gold)}
.trt .nm{font-family:var(--serif);font-size:17px;font-weight:600;display:block}
.trt .ds{font-size:12.5px;color:var(--muted)}

/* pay chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.chip{border:1.5px solid var(--parch-line);background:var(--field);color:var(--ink);border-radius:999px;
  padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;min-height:46px}
.chip.active{background:var(--espresso);color:var(--cream);border-color:var(--espresso)}

/* confirm */
.confirm{background:rgba(244,238,225,.97);border:1px solid var(--parch-line);border-radius:22px;
  box-shadow:0 20px 44px rgba(18,9,2,.4);padding:28px 22px;text-align:center;margin-top:18px}
.confirm .ico{width:58px;height:58px;border-radius:16px;background:var(--parch-2);border:1px solid var(--parch-line);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--gold-deep)}
.confirm h1{font-family:var(--serif);color:var(--gold-deep);font-size:24px;margin:0 0 8px}
.confirm p{color:var(--muted);font-size:14.5px;line-height:1.6;margin:0 0 8px}
.confirm p b{color:var(--ink)}

/* tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 14px}
.tab{padding:9px 13px;font-size:13.5px;border-radius:11px;border:1.5px solid rgba(255,244,225,.26);
  background:rgba(36,24,13,.34);color:var(--cream-dim);cursor:pointer;font-weight:600}
.tab.on{background:var(--parch);color:var(--ink);border-color:var(--parch)}

/* pills (slots admin) */
.pillwrap{display:flex;flex-wrap:wrap;gap:9px}
.pill{display:inline-flex;align-items:center;gap:8px;background:var(--field);border:1.5px solid var(--parch-line);
  border-radius:999px;padding:10px 12px 10px 16px;font-size:15px;font-weight:600;color:var(--ink);min-height:44px}
.pill.booked{background:var(--parch-2);border-color:var(--gold)}
.pill em{font-style:normal;font-size:11px;color:var(--gold-deep)}
.pill button{border:none;background:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:0 2px;width:auto;min-height:0}

/* booking line (specialist) */
.bk{background:rgba(244,238,225,.96);border:1px solid var(--parch-line);border-radius:14px;padding:14px;margin-bottom:10px}
.bk.free{border-style:dashed;background:rgba(244,238,225,.7)}
.tag-time{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--walnut)}

/* social */
.social{display:flex;gap:12px;justify-content:center;margin-top:24px}
.soc{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;text-decoration:none;box-shadow:0 6px 16px rgba(20,12,4,.25)}
.soc svg{width:24px;height:24px}
.soc-ig{background:linear-gradient(45deg,#F09433,#E6683C 25%,#DC2743 50%,#CC2366 75%,#BC1888)}
.soc-wa{background:#25D366}
.flex1{flex:1}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mb8{margin-bottom:8px}
</style>
</head>

/* ---------- date helpers ---------- */
const pad=n=>String(n).padStart(2,'0');
const isoOf=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const todayIso=()=>isoOf(new Date());
function addDays(b,n){const d=new Date(b);d.setHours(0,0,0,0);d.setDate(d.getDate()+n);return d;}
function workday(){const o=[];for(let h=9;h<17;h++){o.push(pad(h)+":00");o.push(pad(h)+":30");}return o;}
function heLong(iso){return new Date(iso+"T00:00:00").toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});}
function heWd(iso){return new Date(iso+"T00:00:00").toLocaleDateString('he-IL',{weekday:'short'});}
function heMo(iso){return new Date(iso+"T00:00:00").toLocaleDateString('he-IL',{month:'short'});}
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const val=id=>{const e=document.getElementById(id);return e?e.value:"";};
function phoneKey(p){let d=String(p||'').replace(/\D/g,'');if(d.startsWith('972'))d=d.slice(3);d=d.replace(/^0+/,'');return d;}
function greeting(){const h=new Date().getHours();return h<12?'בוקר טוב':h<17?'צהריים טובים':h<21?'ערב טוב':'לילה טוב';}
function firstName(n){return String(n||'').trim().split(/\s+/)[0]||'';}

/* ---------- seed / state ---------- */
function seed(){
  const specialists=[
    {id:"s1",phone:"0501111111",name:"מאיה כהן",role:"אסתטיקאית בכירה"},
    {id:"s2",phone:"0502222222",name:"דנה לוי",role:"מומחית לייזר"},
    {id:"s3",phone:"0503333333",name:"נועה בר",role:"מטפלת עור"}
  ];
  const treatments=[
    {id:uid(),specialistId:"s1",name:"טיפול פנים סיגנייצ׳ר",price:280,minutes:60,desc:"ניקוי עמוק מותאם לסוג העור, בתוספת מסכה מרגיעה וסיום בקרם לחות."},
    {id:uid(),specialistId:"s1",name:"פילינג כימי",price:420,minutes:50,desc:"פילינג לחידוש פני העור, להבהרת הגוון וטשטוש קמטוטים."},
    {id:uid(),specialistId:"s2",name:"הסרת שיער בלייזר",price:350,minutes:45,desc:"טיפול לייזר עדין לתוצאה חלקה ומתמשכת. המחיר לאזור בודד."},
    {id:uid(),specialistId:"s3",name:"מיקרונידלינג",price:550,minutes:75,desc:"טיפול מחטים לעידוד קולגן, לשיפור מרקם, צלקות ומיצוק."}
  ];
  const availability={};
  specialists.forEach((s,si)=>{availability[s.id]={};for(let i=1;i<=12;i++){if((i+si)%4===0)continue;availability[s.id][isoOf(addDays(new Date(),i))]=workday();}});
  const d1=isoOf(addDays(new Date(),1));
  const bookings=[
    {id:uid(),specialistId:"s1",date:d1,time:"10:00",treatmentId:treatments[0].id,name:"טל רז",customerPhone:"0509999999",phone:"0509999999",payment:"מזומן",createdAt:Date.now()}
  ];
  return{
    settings:{shopName:"Yarden Askayo",currency:"₪",instagram:"",whatsapp:"",payLink:""},
    adminPhones:["0500000000"],
    specialists,treatments,availability,bookings,
    customers:[]
  };
}
let state;
try{const raw=localStorage.getItem(KEY_STATE);state=raw?JSON.parse(raw):seed();}catch(e){state=seed();}
function save(){try{localStorage.setItem(KEY_STATE,JSON.stringify(state));}catch(e){console.error(e);}}
if(!localStorage.getItem(KEY_STATE))save();

/* ---------- session ---------- */
let session=null;
try{const raw=localStorage.getItem(KEY_SESSION);if(raw){const s=JSON.parse(raw);if(!s.expiresAt||Date.now()<s.expiresAt)session=s;else localStorage.removeItem(KEY_SESSION);}}catch(e){}
function setSession(o){session=o;try{localStorage.setItem(KEY_SESSION,JSON.stringify(o));}catch(e){}}
function logout(){session=null;try{localStorage.removeItem(KEY_SESSION);}catch(e){}resetBooking();ui.view="login";ui.loginPhone="";render();}
const DAY=86400000;

/* ---------- derived ---------- */
const money=n=>(state.settings.currency||"₪")+n;
const specById=id=>state.specialists.find(s=>s.id===id);
const trById=id=>state.treatments.find(t=>t.id===id);
const trtsOf=sid=>state.treatments.filter(t=>t.specialistId===sid);
const customerByPhone=p=>state.customers.find(c=>phoneKey(c.phone)===phoneKey(p));
function roleOf(phone){const k=phoneKey(phone);
  if(state.adminPhones.some(a=>phoneKey(a)===k))return"admin";
  if(state.specialists.some(s=>phoneKey(s.phone)===k))return"specialist";
  return"customer";}
function specialistOfPhone(phone){const k=phoneKey(phone);return state.specialists.find(s=>phoneKey(s.phone)===k)||null;}
const isBooked=(sid,date,time)=>state.bookings.some(b=>b.specialistId===sid&&b.date===date&&b.time===time);
const isSat=iso=>new Date(iso+"T00:00:00").getDay()===6; // Saturday is always closed
function freeSlots(sid,date){if(isSat(date))return [];const all=((state.availability[sid]||{})[date]||[]).slice().sort();return all.filter(t=>!isBooked(sid,date,t));}
function availDatesWithin(sid,days){const out=[];const base=new Date();base.setHours(0,0,0,0);
  for(let i=0;i<days;i++){const iso=isoOf(addDays(base,i));if(freeSlots(sid,iso).length)out.push(iso);}return out;}
function monogram(name){return (firstName(name)[0]||'').toUpperCase();}

function specCal(sp){
  const base=new Date();base.setHours(0,0,0,0);
  const dows=['א','ב','ג','ד','ה','ו','ש'];
  let cells="";
  for(let i=0;i<14;i++){const dt=addDays(base,i),iso=isoOf(dt);
    const all=((state.availability[sp.id]||{})[iso]||[]);
    const booked=state.bookings.filter(b=>b.specialistId===sp.id&&b.date===iso).length;
    const free=freeSlots(sp.id,iso).length;
    const sel=ui.specDay===iso;
    let cls="day";if(sel)cls+=" sel";else if(booked)cls+=" booked avail";else if(free)cls+=" avail";else if(!all.length)cls+=" off";
    let mk=booked?booked+" תפוס":free?free+" פנוי":"—";
    if(isSat(iso)){cls=sel?"day off sel":"day off";mk="שבת";}
    cells+=`<button class="${cls}" data-action="spec-day" data-d="${iso}"><span class="dn">${dt.getDate()}</span><span class="mk">${esc(mk)}</span></button>`;
  }
  let dayView="";
  if(ui.specDay){
    const iso=ui.specDay;
    const bookings=state.bookings.filter(b=>b.specialistId===sp.id&&b.date===iso).sort((a,b)=>a.time.localeCompare(b.time));
    const free=freeSlots(sp.id,iso);
    const bk=bookings.map(b=>{const tr=trById(b.treatmentId);
      const resched=ui.reschedId===b.id?`<div class="mt8" style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
          <label class="field" style="margin:0;flex:1"><span>תאריך חדש</span><input id="rsDate_${b.id}" type="date" min="${todayIso()}" value="${b.date}"></label>
          <label class="field" style="margin:0;width:120px"><span>שעה</span><input id="rsTime_${b.id}" type="time" value="${b.time}"></label>
          <button class="mini gold" data-action="resched-save" data-id="${b.id}">שמירה</button>
          <button class="mini" data-action="resched-cancel">ביטול</button></div>`:'';
      return `<div class="bk">
        <div class="row-between"><div><span class="tag-time">${esc(b.time)}</span> · <b>${esc(b.name)}</b></div>
          <div style="display:flex;gap:6px"><button class="mini" data-action="resched-start" data-id="${b.id}">העברה</button>
          <button class="mini danger" data-action="spec-del" data-id="${b.id}">מחיקה</button></div></div>
        <div class="sub mt8">${tr?esc(tr.name):'—'} ${tr?'('+esc(money(tr.price))+')':''}${b.phone?' · '+esc(b.phone):''}</div>
        ${resched}</div>`;}).join("");
    const freeLine=free.length?`<div class="sub" style="color:var(--cream-dim);margin:4px 2px 0">שעות פנויות: ${free.join(", ")}</div>`:`<div class="sub" style="color:var(--cream-dim);margin:4px 2px 0">אין שעות פנויות.</div>`;
    dayView=`<div class="sec">${esc(heLong(iso))}</div>${bookings.length?bk:'<div class="empty">אין תורים מוזמנים ליום זה.</div>'}${freeLine}`;
  }
  return `<div class="calwrap"><div class="dow">${dows.map(d=>`<span>${d}</span>`).join("")}</div><div class="cal">${cells}</div></div>
    <p class="note" style="color:var(--cream-dim)">לחצי על יום כדי לראות ולנהל את התורים בו.</p>${dayView}`;
}
function specTrt(sp){
  const list=trtsOf(sp.id).map(tr=>{
    if(ui.editTrtId===tr.id)return trtEditCard("et",tr,'trt-save','trt-cancel',tr.id);
    return `<div class="dcard">
      <div class="row-between" style="align-items:flex-start">
        <div><div class="title-s">${esc(tr.name)} <span class="price" style="font-size:16px">· ${esc(money(tr.price))}</span></div>
          <div class="sub mt8">${esc(tr.minutes)} דק׳ — ${esc(tr.desc)}</div></div>
        <div style="display:flex;gap:6px;flex-shrink:0"><button class="mini" data-action="trt-edit" data-id="${tr.id}">עריכה</button>
          <button class="mini danger" data-action="trt-del" data-id="${tr.id}">מחיקה</button></div></div></div>`;}).join("");
  const add=ui.editTrtId==="new"?trtEditCard("nt",{name:"",desc:"",price:"",minutes:""},'trt-add-save','trt-cancel',"new")
    :`<button class="btn btn-dark mt8" data-action="trt-add-start">+ הוספת טיפול</button>`;
  return `${list||'<div class="empty">עדיין לא הוספת טיפולים.</div>'}${add}`;
}
function trtEditCard(p,tr,saveAct,cancelAct,id){
  return `<div class="dcard">
    <label class="field"><span>שם הטיפול</span><input id="${p}Name" value="${esc(tr.name||'')}"></label>
    <label class="field"><span>תיאור (מוצג ללקוחות)</span><textarea id="${p}Desc">${esc(tr.desc||'')}</textarea></label>
    <div style="display:flex;gap:10px">
      <label class="field" style="flex:1"><span>מחיר</span><input id="${p}Price" type="number" inputmode="numeric" value="${esc(tr.price??'')}"></label>
      <label class="field" style="flex:1"><span>דקות</span><input id="${p}Min" type="number" inputmode="numeric" value="${esc(tr.minutes??'')}"></label></div>
    <div class="btn-row"><button class="mini gold" data-action="${saveAct}" data-id="${id}">שמירה</button>
      <button class="mini" data-action="${cancelAct}">ביטול</button></div></div>`;
}
function specAvail(sp){return availEditor(sp.id);}

/* ---------- availability editor (shared specialist + admin) ---------- */
function availEditor(sid){
  const date=ui.availDate;
  const slots=((state.availability[sid]||{})[date]||[]).slice().sort();
  const slotChips=slots.length?slots.map(t=>{const taken=isBooked(sid,date,t);
    return `<span class="pill ${taken?'booked':''}">${t}${taken?'<em>תפוס</em>':`<button data-action="avail-remove" data-sid="${sid}" data-t="${t}">×</button>`}</span>`;}).join("")
    :`<div class="empty">אין עדיין שעות ליום זה.</div>`;
  return `<div class="dcard">
    <label class="field"><span>תאריך</span><input id="availDate" type="date" min="${todayIso()}" value="${date}"></label>
    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
      <label class="field" style="flex:1;min-width:130px;margin-bottom:0"><span>הוספת שעה</span><input id="availTime" type="time" value="09:00"></label>
      <button class="mini gold" data-action="avail-add" data-sid="${sid}">הוספה</button>
    </div>
    <button class="mini" style="width:100%;margin-top:14px" data-action="avail-fill" data-sid="${sid}">מילוי יום עבודה 9–17</button>
    <div class="sub" style="margin:18px 0 10px">שעות ב-${esc(heLong(date))}:</div>
    <div class="pillwrap">${slotChips}</div></div>`;
}

/* ---------- admin ---------- */
function vAdmin(){
  const tabs=[["users","משתמשים"],["specs","מומחיות"],["avail","זמינות"],["trts","טיפולים"],["bookings","תורים"],["settings","הגדרות"]];
  const tabBar=tabs.map(([id,l])=>`<button class="tab ${ui.admTab===id?'on':''}" data-action="adm-tab" data-tab="${id}">${l}</button>`).join("");
  let body="";
  if(ui.admTab==="users")body=admUsers();
  else if(ui.admTab==="specs")body=admSpecs();
  else if(ui.admTab==="avail")body=admAvail();
  else if(ui.admTab==="trts")body=admTrts();
  else if(ui.admTab==="bookings")body=admBookings();
  else body=admSettings();
  return `${topbar()}
    <h1 class="h-cream" style="font-size:24px;margin:2px 0 4px">ניהול הסטודיו</h1>
    <div class="tabs">${tabBar}</div>${body}`;
}
function admUsers(){
  const admins=state.adminPhones.map(p=>`<span class="pill">${esc(p)}${state.adminPhones.length>1?`<button data-action="adm-remove-admin" data-p="${esc(p)}">×</button>`:''}</span>`).join("");
  const specs=state.specialists.map(s=>`<div class="dcard row-between">
      <div><div class="title-s" style="font-size:17px">${esc(s.name)}</div><div class="sub" dir="ltr" style="text-align:right">${esc(s.phone)} · ${esc(s.role)}</div></div>
      <button class="mini danger" data-action="spec-remove" data-id="${s.id}">הסרת תיוג</button></div>`).join("");
  return `<div class="sec">מנהלים</div>
    <div class="dcard"><div style="margin-bottom:8px">${admins||'<span class="sub">אין</span>'}</div>
      <div style="display:flex;gap:10px;align-items:flex-end">
        <label class="field" style="flex:1;margin:0"><span>הוספת מספר מנהל</span><input id="newAdmin" type="tel" dir="ltr" placeholder="0500000000"></label>
        <button class="mini gold" data-action="adm-add-admin">הוספה</button></div></div>
    <div class="sec">תיוג מומחיות (Specialist)</div>
    <p class="sub" style="color:var(--cream-dim);margin:-6px 0 10px">מספרים מתויגים יופנו אוטומטית למסך המומחית.</p>
    ${specs||'<div class="empty">אין מומחיות מתויגות.</div>'}
    <div class="dcard"><div class="title-s" style="font-size:16px;margin-bottom:10px">תיוג מספר חדש כמומחית</div>
      <label class="field"><span>שם</span><input id="nsName" placeholder="שם מלא"></label>
      <div style="display:flex;gap:10px">
        <label class="field" style="flex:1"><span>טלפון</span><input id="nsPhone" type="tel" dir="ltr" placeholder="0500000000"></label>
        <label class="field" style="flex:1"><span>תפקיד</span><input id="nsRole" placeholder="מומחית לייזר"></label></div>
      <button class="mini gold" data-action="spec-add">תיוג כמומחית</button></div>`;
}
function admSpecs(){
  const list=state.specialists.map(s=>{
    if(ui.editTechId===s.id)return `<div class="dcard">
      <label class="field"><span>שם</span><input id="esName" value="${esc(s.name)}"></label>
      <label class="field"><span>טלפון</span><input id="esPhone" type="tel" dir="ltr" value="${esc(s.phone)}"></label>
      <label class="field"><span>תפקיד</span><input id="esRole" value="${esc(s.role)}"></label>
      <div class="btn-row"><button class="mini gold" data-action="spec-edit-save" data-id="${s.id}">שמירה</button>
        <button class="mini" data-action="spec-edit-cancel">ביטול</button></div></div>`;
    return `<div class="dcard row-between">
      <div style="display:flex;gap:12px;align-items:center"><span class="mono">${esc(monogram(s.name))}</span>
        <div><div class="title-s" style="font-size:17px">${esc(s.name)}</div><div class="sub">${esc(s.role)}</div></div></div>
      <button class="mini" data-action="spec-edit" data-id="${s.id}">עריכה</button></div>`;}).join("");
  return `${list||'<div class="empty">אין מומחיות.</div>'}<p class="note" style="color:var(--cream-dim)">להוספה/הסרה של מומחית השתמשו בטאב «משתמשים».</p>`;
}
function admAvail(){
  if(!state.specialists.length)return `<div class="empty">הוסיפו מומחית קודם.</div>`;
  if(!ui.availSpec||!specById(ui.availSpec))ui.availSpec=state.specialists[0].id;
  const opts=state.specialists.map(s=>`<option value="${s.id}" ${s.id===ui.availSpec?'selected':''}>${esc(s.name)}</option>`).join("");
  return `<label class="field"><span>מומחית</span><select id="availSpec">${opts}</select></label>${availEditor(ui.availSpec)}`;
}
function admTrts(){
  if(!state.specialists.length)return `<div class="empty">הוסיפו מומחית קודם.</div>`;
  if(!ui.admSpec||!specById(ui.admSpec))ui.admSpec=state.specialists[0].id;
  const opts=state.specialists.map(s=>`<option value="${s.id}" ${s.id===ui.admSpec?'selected':''}>${esc(s.name)}</option>`).join("");
  const list=trtsOf(ui.admSpec).map(tr=>{
    if(ui.admEditTrtId===tr.id)return trtEditCard("aet",tr,'adm-trt-save','adm-trt-cancel',tr.id);
    return `<div class="dcard row-between" style="align-items:flex-start">
      <div><div class="title-s" style="font-size:17px">${esc(tr.name)} <span class="price" style="font-size:15px">· ${esc(money(tr.price))}</span></div>
        <div class="sub mt8">${esc(tr.minutes)} דק׳ — ${esc(tr.desc)}</div></div>
      <div style="display:flex;gap:6px;flex-shrink:0"><button class="mini" data-action="adm-trt-edit" data-id="${tr.id}">עריכה</button>
        <button class="mini danger" data-action="adm-trt-del" data-id="${tr.id}">מחיקה</button></div></div>`;}).join("");
  const add=ui.admEditTrtId==="new"?trtEditCard("ant",{name:"",desc:"",price:"",minutes:""},'adm-trt-add-save','adm-trt-cancel',"new")
    :`<button class="btn btn-dark mt8" data-action="adm-trt-add-start">+ הוספת טיפול</button>`;
  return `<label class="field"><span>מומחית</span><select id="admSpec">${opts}</select></label>${list||'<div class="empty">אין טיפולים למומחית זו.</div>'}${add}`;
}
function admBookings(){
  const sorted=state.bookings.slice().sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  if(!sorted.length)return `<div class="empty">אין תורים מוזמנים.</div>`;
  return sorted.map(b=>{const sp=specById(b.specialistId),tr=trById(b.treatmentId);
    return `<div class="dcard row-between">
      <div><div class="title-s" style="font-size:16px">${esc(heLong(b.date))} · ${esc(b.time)}</div>
        <div class="sub">${esc(b.name)}${b.phone?' · '+esc(b.phone):''} — ${tr?esc(tr.name):'—'} עם ${sp?esc(sp.name):'—'}${b.payment?' · '+esc(b.payment):''}</div></div>
      <button class="mini danger" data-action="adm-booking-cancel" data-id="${b.id}">ביטול</button></div>`;}).join("");
}
function admSettings(){
  const s=state.settings;
  return `<div class="dcard">
    <label class="field"><span>שם הסטודיו</span><input id="setName" value="${esc(s.shopName)}"></label>
    <label class="field" style="width:140px"><span>סמל מטבע</span><input id="setCur" value="${esc(s.currency)}"></label>
    <label class="field"><span>Instagram (קישור או @)</span><input id="setIg" dir="ltr" value="${esc(s.instagram||'')}" placeholder="https://instagram.com/..."></label>
    <label class="field"><span>WhatsApp (מספר או קישור)</span><input id="setWa" dir="ltr" value="${esc(s.whatsapp||'')}" placeholder="9725XXXXXXXX"></label>
    <label class="field"><span>קישור תשלום (Bit / PayBox / Stripe…)</span><input id="setPay" dir="ltr" value="${esc(s.payLink||'')}" placeholder="https://..."></label>
    <button class="mini gold" data-action="settings-save">שמירת הגדרות</button></div>`;
}

/* ---------- render ---------- */
function render(){
  const app=document.getElementById('app');
  const v=ui.view;
  let html="";
  if(v==="splash")html=vSplash();
  else if(v==="login")html=vLogin();
  else if(v==="register")html=vRegister();
  else if(v==="custHome")html=vCustHome();
  else if(v==="custTreatments")html=vCustTreatments();
  else if(v==="custDetail")html=vCustDetail();
  else if(v==="custBook")html=vCustBook();
  else if(v==="spec")html=vSpec();
  else if(v==="admin")html=vAdmin();
  app.innerHTML=html;
  window.scrollTo({top:0,behavior:"instant"});
}

/* route to the right home for the current session */
function homeView(){if(!session)return"login";if(session.role==="admin")return"admin";if(session.role==="specialist")return"spec";return"custHome";}
function goHome(){resetBooking();ui.view=homeView();render();}

/* ---------- login flow ---------- */
function doLogin(phone){
  phone=phone.trim();if(!phone){alert("נא להזין מספר טלפון.");return;}
  const role=roleOf(phone);
  // NOTE: WhatsApp code verification will be inserted here once the backend exists.
  if(role==="admin"){setSession({phone,role,name:"מנהל",expiresAt:null});goHome();return;}
  if(role==="specialist"){const sp=specialistOfPhone(phone);setSession({phone,role,name:sp.name,specialistId:sp.id,expiresAt:null});goHome();return;}
  // customer
  const c=customerByPhone(phone);
  if(c){setSession({phone,role:"customer",name:c.name,expiresAt:Date.now()+30*DAY});goHome();return;}
  ui.loginPhone=phone;ui.view="register";render();
}
function doRegister(){
  const name=val("regName").trim();if(!name){alert("נא להזין שם.");return;}
  const age=val("regAge").trim(),gender=val("regGender");
  const phone=ui.loginPhone;
  state.customers.push({phone,name,age,gender,createdAt:Date.now()});save();
  setSession({phone,role:"customer",name,expiresAt:Date.now()+30*DAY});goHome();
}

/* ---------- events ---------- */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset.action,id=el.dataset.id,d=el.dataset.d,t=el.dataset.t;
  switch(a){
    case"logout":logout();break;
    case"go-home-btn":goHome();break;
    case"login-submit":doLogin(val("loginPhone"));break;
    case"register-submit":doRegister();break;
    case"cust-home":goHome();break;
    case"go-treatments":ui.view="custTreatments";render();break;
    case"go-book":resetBooking();ui.view="custBook";render();break;
    case"trt-detail":ui.trtDetail=id;ui.view="custDetail";render();break;
    case"book-this":{const tr=trById(id);resetBooking();if(tr){ui.bkSpec=tr.specialistId;ui.bkTrt=null;}ui.view="custBook";render();break;}
    case"bk-spec":ui.bkSpec=id;ui.bkDate=ui.bkTime=ui.bkTrt=null;render();break;
    case"bk-date":ui.bkDate=d;ui.bkTime=ui.bkTrt=null;render();break;
    case"bk-time":ui.bkTime=t;ui.bkTrt=null;render();break;
    case"bk-trt":ui.bkTrt=id;render();break;
    case"bk-pay":{ui.bkPay=el.dataset.pay;document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.pay===ui.bkPay));break;}
    case"bk-confirm":{
      const name=val("bkName").trim();if(!name){alert("נא להזין שם.");break;}
      const bk={id:uid(),specialistId:ui.bkSpec,date:ui.bkDate,time:ui.bkTime,treatmentId:ui.bkTrt,
        name,customerPhone:session.phone,phone:val("bkPhone").trim()||session.phone,payment:ui.bkPay||"מזומן",createdAt:Date.now()};
      state.bookings.push(bk);save();ui.confirmed=bk;render();break;}

    /* specialist */
    case"spec-tab":ui.specTab=el.dataset.tab;ui.specDay=null;ui.reschedId=null;ui.editTrtId=null;render();break;
    case"spec-day":ui.specDay=d;ui.reschedId=null;render();break;
    case"resched-start":ui.reschedId=id;render();break;
    case"resched-cancel":ui.reschedId=null;render();break;
    case"resched-save":{
      const nd=val("rsDate_"+id),nt=val("rsTime_"+id);const b=state.bookings.find(x=>x.id===id);
      if(b&&nd&&nt){if(isBooked(b.specialistId,nd,nt)&&!(b.date===nd&&b.time===nt)){alert("השעה הזו כבר תפוסה.");break;}b.date=nd;b.time=nt;save();}
      ui.reschedId=null;ui.specDay=nd||ui.specDay;render();break;}
    case"spec-del":{if(!confirm("למחוק את התור? השעה תתפנה."))break;state.bookings=state.bookings.filter(x=>x.id!==id);save();render();break;}
    case"trt-edit":ui.editTrtId=id;render();break;
    case"trt-cancel":ui.editTrtId=null;render();break;
    case"trt-add-start":ui.editTrtId="new";render();break;
    case"trt-save":{const tr=trById(id);if(tr){tr.name=val("etName").trim()||tr.name;tr.desc=val("etDesc").trim();tr.price=Number(val("etPrice"))||0;tr.minutes=Number(val("etMin"))||30;save();}ui.editTrtId=null;render();break;}
    case"trt-add-save":{const sp=specialistOfPhone(session.phone);const name=val("ntName").trim();if(!name){alert("נא להזין שם טיפול.");break;}
      state.treatments.push({id:uid(),specialistId:sp.id,name,desc:val("ntDesc").trim(),price:Number(val("ntPrice"))||0,minutes:Number(val("ntMin"))||30});save();ui.editTrtId=null;render();break;}
    case"trt-del":{if(!confirm("למחוק את הטיפול?"))break;state.treatments=state.treatments.filter(x=>x.id!==id);save();render();break;}

    /* availability (shared) */
    case"avail-add":{const sid=el.dataset.sid,time=val("availTime");if(!time)break;
      const av=state.availability[sid]||(state.availability[sid]={});const list=av[ui.availDate]||[];if(!list.includes(time)){list.push(time);list.sort();}av[ui.availDate]=list;save();render();break;}
    case"avail-fill":{const sid=el.dataset.sid;const av=state.availability[sid]||(state.availability[sid]={});const set=new Set([...(av[ui.availDate]||[]),...workday()]);av[ui.availDate]=[...set].sort();save();render();break;}
    case"avail-remove":{const sid=el.dataset.sid;const av=state.availability[sid];if(av){av[ui.availDate]=(av[ui.availDate]||[]).filter(x=>x!==t);if(!av[ui.availDate].length)delete av[ui.availDate];save();}render();break;}

    /* admin: users */
    case"adm-add-admin":{const p=val("newAdmin").trim();if(!p)break;if(!state.adminPhones.some(x=>phoneKey(x)===phoneKey(p)))state.adminPhones.push(p);save();render();break;}
    case"adm-remove-admin":{const p=el.dataset.p;if(state.adminPhones.length<=1){alert("חייב להישאר מנהל אחד לפחות.");break;}state.adminPhones=state.adminPhones.filter(x=>x!==p);save();render();break;}
    case"spec-add":{const name=val("nsName").trim(),phone=val("nsPhone").trim();if(!name||!phone){alert("נא להזין שם וטלפון.");break;}
      const nid=uid();state.specialists.push({id:nid,phone,name,role:val("nsRole").trim()||"מומחית"});state.availability[nid]={};save();render();break;}
    case"spec-remove":{if(!confirm("להסיר את התיוג והפרופיל של מומחית זו?"))break;
      state.specialists=state.specialists.filter(s=>s.id!==id);delete state.availability[id];
      state.treatments=state.treatments.filter(tr=>tr.specialistId!==id);state.bookings=state.bookings.filter(b=>b.specialistId!==id);save();render();break;}
    /* admin: specs edit */
    case"spec-edit":ui.editTechId=id;render();break;
    case"spec-edit-cancel":ui.editTechId=null;render();break;
    case"spec-edit-save":{const s=specById(id);if(s){s.name=val("esName").trim()||s.name;s.phone=val("esPhone").trim()||s.phone;s.role=val("esRole").trim();save();}ui.editTechId=null;render();break;}
    /* admin: trts */
    case"adm-trt-edit":ui.admEditTrtId=id;render();break;
    case"adm-trt-cancel":ui.admEditTrtId=null;render();break;
    case"adm-trt-add-start":ui.admEditTrtId="new";render();break;
    case"adm-trt-save":{const tr=trById(id);if(tr){tr.name=val("aetName").trim()||tr.name;tr.desc=val("aetDesc").trim();tr.price=Number(val("aetPrice"))||0;tr.minutes=Number(val("aetMin"))||30;save();}ui.admEditTrtId=null;render();break;}
    case"adm-trt-add-save":{const name=val("antName").trim();if(!name){alert("נא להזין שם טיפול.");break;}
      state.treatments.push({id:uid(),specialistId:ui.admSpec,name,desc:val("antDesc").trim(),price:Number(val("antPrice"))||0,minutes:Number(val("antMin"))||30});save();ui.admEditTrtId=null;render();break;}
    case"adm-trt-del":{if(!confirm("למחוק את הטיפול?"))break;state.treatments=state.treatments.filter(x=>x.id!==id);save();render();break;}
    /* admin: bookings */
    case"adm-booking-cancel":{if(!confirm("לבטל את התור? השעה תתפנה."))break;state.bookings=state.bookings.filter(b=>b.id!==id);save();render();break;}
    case"adm-tab":ui.admTab=el.dataset.tab;ui.editTechId=null;ui.admEditTrtId=null;render();break;
    case"settings-save":{const s=state.settings;s.shopName=val("setName").trim()||"Yarden Askayo";s.currency=val("setCur").trim()||"₪";
      s.instagram=val("setIg").trim();s.whatsapp=val("setWa").trim();s.payLink=val("setPay").trim();save();alert("ההגדרות נשמרו.");render();break;}
  }
});

document.addEventListener('keydown',e=>{
  if(e.target.id==="loginPhone"&&e.key==="Enter"){e.preventDefault();doLogin(val("loginPhone"));}
});
document.addEventListener('change',e=>{
  if(e.target.id==="availDate"){ui.availDate=e.target.value;render();}
  else if(e.target.id==="availSpec"){ui.availSpec=e.target.value;render();}
  else if(e.target.id==="admSpec"){ui.admSpec=e.target.value;ui.admEditTrtId=null;render();}
});

/* ---------- boot ---------- */
ui.view="splash";render();
setTimeout(()=>{ui.view=homeView();render();},3200);
</script>
</body>
</html>
